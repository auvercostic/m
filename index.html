<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pageTitle">MOCVIA Spa</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Tailwind CSS via CDN cho UI/UX-->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            spa: {
              gold: '#1a8f10',       
              goldLight: '#F3E5AB',  
              brown: '#5C4033',      
              green: '#8F9779',      
              bg: '#FAFAF5',         
              white: '#FFFFFF'
            }
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Plus Jakarta Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Link file CSS -->
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-spa-bg font-sans text-spa-brown min-h-screen relative pb-24 lg:pb-0">

  <!-- Header -->
  <header class="bg-spa-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div>
        <h1 class="font-serif text-2xl md:text-3xl font-bold text-spa-gold" data-i18n="headerTitle">MOCVIA Spa</h1>
        <p class="text-sm md:text-base text-spa-green" data-i18n="headerSubtitle">Chăm sóc sức khỏe & Liệu pháp thảo dược</p>
      </div>
      
      <!-- Language Switcher -->
      <button id="lang-toggle" class="flex items-center gap-2 border border-spa-gold text-spa-gold px-3 py-1.5 rounded-full hover:bg-spa-gold hover:text-white transition-colors">
        <i class="fa-solid fa-globe"></i>
        <span id="current-lang" class="font-semibold uppercase text-sm">VI</span>
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <!-- Menu Accordion -->
    <div class="lg:col-span-2">
      <h2 class="font-serif text-2xl font-semibold mb-6 border-b border-spa-goldLight pb-2 text-spa-brown" data-i18n="menuTitle">Dịch vụ của chúng tôi</h2>
      
      <div id="menu-container" class="space-y-4">
        <!-- Rendered via JS -->
      </div>
    </div>

    <!-- Khu vực Giỏ hàng (Cart) -->
    <div id="cart-container" class="fixed inset-0 z-50 bg-black/50 hidden lg:relative lg:block lg:z-0 lg:bg-transparent lg:inset-auto pointer-events-auto">
      <div class="absolute bottom-0 w-full lg:sticky lg:top-24 bg-spa-white p-6 rounded-t-2xl lg:rounded-2xl shadow-2xl lg:shadow-md transform transition-transform translate-y-full lg:translate-y-0 duration-300 h-[85vh] lg:h-auto flex flex-col" id="cart-panel">
        
        <div class="flex justify-between items-center mb-4 pb-4 border-b border-spa-goldLight">
          <h2 class="font-serif text-xl font-semibold flex items-center gap-2">
            <i class="fa-solid fa-basket-shopping text-spa-gold"></i>
            <span data-i18n="cartTitle">Giỏ hàng của bạn</span>
          </h2>
          <!-- Nút đóng giỏ hàng trên mobile -->
          <button id="close-cart-btn" class="lg:hidden text-spa-brown p-2 hover:bg-gray-100 rounded-full transition-colors"><i class="fa-solid fa-xmark text-xl w-6 h-6"></i></button>
        </div>

        <!-- Danh sách Item trong giỏ hàng -->
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-3 mb-4 pr-2">
          <!-- Rendered via JS -->
          
          <!-- Thông báo giỏ hàng trống mặc định -->
          <div class="text-center text-gray-400 py-12" id="empty-cart-msg">
            <i class="fa-solid fa-cart-arrow-down text-5xl mb-4 text-gray-300"></i>
            <p data-i18n="emptyCart" class="font-medium">Giỏ hàng trống</p>
          </div>
        </div>

        <!-- Phần Tổng tiền và Nút Checkout -->
        <div class="pt-4 border-t border-spa-goldLight bg-spa-white">
          <div class="flex justify-between items-center mb-6 font-bold text-lg lg:text-xl">
            <span data-i18n="total" class="text-spa-brown">Tổng cộng</span>
            <span class="text-spa-gold text-2xl"><span id="cart-total">0</span>k</span>
          </div>
          <button id="checkout-btn" class="w-full bg-spa-gold text-white font-semibold py-3.5 rounded-xl hover:bg-yellow-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed text-lg shadow-md" disabled>
            <span data-i18n="checkoutBtn">Tiến hành Đặt lịch</span>
          </button>
        </div>

      </div>
    </div>

  </main>

  <!-- Nút Floating Cart trên Mobile -->
  <button id="floating-cart" class="lg:hidden fixed bottom-6 right-6 bg-spa-gold text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center z-30 hover:scale-105 transition-transform">
    <div class="relative">
      <i class="fa-solid fa-basket-shopping text-xl"></i>
      <span id="floating-cart-count" class="absolute -top-2 -right-3 bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center shadow-sm border border-white">0</span>
    </div>
  </button>

  <!-- Checkout Form Modal -->
  <div id="checkout-modal" class="fixed inset-0 z-[60] bg-black/60 hidden items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-spa-white rounded-2xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
      <h3 class="font-serif text-2xl font-bold mb-6 text-center text-spa-gold" data-i18n="formTitle">Thông tin Đặt lịch</h3>
      
      <form id="booking-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold mb-1 text-spa-brown" data-i18n="nameLabel">Họ và tên (*)</label>
          <input type="text" id="cust-name" required class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-spa-gold focus:ring-1 focus:ring-spa-gold bg-gray-50 transition-colors">
        </div>
        
        <div>
          <label class="block text-sm font-semibold mb-1 text-spa-brown" data-i18n="phoneLabel">Số điện thoại (*)</label>
          <input type="tel" id="cust-phone" required class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-spa-gold focus:ring-1 focus:ring-spa-gold bg-gray-50 transition-colors">
        </div>

        <div>
          <label class="block text-sm font-semibold mb-3 text-spa-brown" data-i18n="serviceTypeLabel">Hình thức phục vụ</label>
          <div class="flex flex-col gap-3">
            <label class="flex items-center gap-3 cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-spa-goldLight transition-colors">
              <input type="radio" name="serve_type" value="now" checked class="text-spa-gold focus:ring-spa-gold w-4 h-4">
              <span data-i18n="typeNow" class="font-medium">Làm ngay tại quán</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer p-3 border border-gray-200 rounded-lg hover:bg-spa-goldLight transition-colors">
              <input type="radio" name="serve_type" value="book" class="text-spa-gold focus:ring-spa-gold w-4 h-4">
              <span data-i18n="typeBook" class="font-medium">Đặt lịch trước</span>
            </label>
          </div>
        </div>

        <!-- Khối chọn Ngày Giờ sẽ hiện khi chọn Đặt lịch trước -->
        <div id="datetime-fields" class="hidden grid-cols-2 gap-4 pt-2">
          <div>
            <label class="block text-sm font-semibold mb-1 text-spa-brown" data-i18n="dateLabel">Ngày hẹn</label>
            <input type="date" id="cust-date" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-spa-gold focus:ring-1 focus:ring-spa-gold bg-gray-50">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1 text-spa-brown" data-i18n="timeLabel">Giờ hẹn</label>
            <input type="time" id="cust-time" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-spa-gold focus:ring-1 focus:ring-spa-gold bg-gray-50">
          </div>
        </div>

        <div class="pt-6 flex gap-3">
          <button type="button" id="cancel-checkout-btn" class="flex-1 bg-gray-200 text-spa-brown font-semibold py-3 rounded-xl hover:bg-gray-300 transition-colors" data-i18n="cancelBtn">Quay lại</button>
          <button type="submit" id="submit-btn" class="flex-1 bg-spa-green text-white font-semibold py-3 rounded-xl hover:bg-emerald-700 transition-colors flex items-center justify-center gap-2 shadow-md">
            <span data-i18n="confirmBtn">Xác nhận</span>
            <i class="fa-solid fa-spinner fa-spin hidden" id="loading-spinner"></i>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Thank You Screen -->
  <div id="thank-you-screen" class="fixed inset-0 z-[70] bg-spa-bg hidden flex-col items-center justify-center p-6 text-center">
    <div class="w-24 h-24 bg-spa-goldLight rounded-full flex items-center justify-center mb-6 shadow-lg">
      <i class="fa-solid fa-check text-5xl text-spa-gold"></i>
    </div>
    <h2 class="font-serif text-3xl font-bold text-spa-brown mb-4" data-i18n="thankYouTitle">Cảm ơn quý khách!</h2>
    <p class="text-lg text-spa-green max-w-md mx-auto mb-10" data-i18n="thankYouMsg">Yêu cầu đặt lịch của bạn đã được gửi thành công. Chúng tôi sẽ liên hệ lại trong thời gian sớm nhất.</p>
    <button id="back-home-btn" class="bg-spa-gold text-white font-semibold px-8 py-3.5 rounded-xl hover:bg-yellow-600 transition-colors shadow-md" data-i18n="backHomeBtn">Trở về trang chủ</button>
  </div>

  <!-- File JavaScript chứa logic -->
  <script type="module" src="/script.js"></script>
</body>
</html>
